<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2b7fd4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flight Tools">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Flight Tools</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f5f7f9; --ink:#10141a; --muted:#5f6b78;
    --line:#c4ccd4; --accent:#2b7fd4; --accent-dk:#1f63a8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}

  header{padding:28px 20px 8px;text-align:center}
  header h1{margin:0;font-size:24px;letter-spacing:.3px}
  header p{margin:6px 0 0;color:var(--muted);font-size:14px}

  main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
  .cards{display:grid;gap:16px;width:100%;max-width:760px;
    grid-template-columns:1fr}
  @media(min-width:680px){.cards{grid-template-columns:1fr 1fr}}

  .card{display:flex;flex-direction:column;align-items:center;text-align:center;
    text-decoration:none;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:18px;padding:30px 22px;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    min-height:200px;justify-content:center}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(20,30,50,.12);
    border-color:var(--accent)}
  .card:active{transform:translateY(0)}
  .ico{width:74px;height:74px;margin-bottom:16px;color:var(--accent)}
  .card h2{margin:0 0 6px;font-size:20px}
  .card p{margin:0;font-size:13px;color:var(--muted);line-height:1.45}
  .go{margin-top:16px;font-size:13px;font-weight:600;color:var(--accent);
    display:inline-flex;align-items:center;gap:5px}

  footer{padding:14px 20px 24px;text-align:center;color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <header>
    <h1>Flight Tools</h1>
    <p>Pick a planner</p>
  </header>

  <main>
    <div class="cards">
      <a class="card" href="wb_calc.html">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3v18"/>
          <path d="M5 7h14"/>
          <path d="M5 7l-2.5 6a3 3 0 0 0 5 0L5 7z"/>
          <path d="M19 7l-2.5 6a3 3 0 0 0 5 0L19 7z"/>
          <path d="M8 21h8"/>
        </svg>
        <h2>Weight &amp; Balance</h2>
        <p>Load sheet and C of G check</p>
        <span class="go">Open &rarr;</span>
      </a>

      <a class="card" href="wind_planner.html">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 3v18M3 12h18"/>
          <path d="M12 12l4.5-4.5"/>
          <circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
        <h2>Wind &amp; Diversion</h2>
        <p>Drift rose and time-per-leg planner</p>
        <span class="go">Open &rarr;</span>
      </a>
    </div>
  </main>

  <footer>For planning use only — always cross-check.</footer>
</body>
</html>
